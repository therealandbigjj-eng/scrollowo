<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>scrollowo - e621 Scroller</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #000;
            color: #fff;
            overflow: hidden;
        }

        .container {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .progress-bar {
            position: absolute;
            top: 0;
            left: 0;
            height: 3px;
            background: linear-gradient(90deg, #0ea5e9, #06b6d4);
            width: 0%;
            transition: width 0.2s ease;
            z-index: 101;
        }

        .progress-bar.active {
            animation: loading 2s infinite;
        }

        @keyframes loading {
            0% { width: 10%; }
            50% { width: 70%; }
            100% { width: 90%; }
        }

        .header {
            background: linear-gradient(135deg, #0ea5e9, #06b6d4);
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 100;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
        }

        .header-title {
            font-size: 20px;
            font-weight: 700;
            flex: 1;
            text-align: center;
        }

        .header-btn {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: #fff;
            cursor: pointer;
            font-size: 20px;
            padding: 8px 12px;
            border-radius: 6px;
            transition: background 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
        }

        .header-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .main-content {
            flex: 1;
            display: flex;
            overflow: hidden;
        }

        .feed {
            flex: 1;
            overflow: hidden;
            position: relative;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .image-container {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            background: #111;
            animation: slideInUp 0.5s ease-out;
        }

        @keyframes slideInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideOutDown {
            from {
                opacity: 1;
                transform: translateY(0);
            }
            to {
                opacity: 0;
                transform: translateY(30px);
            }
        }

        .image-container.exiting {
            animation: slideOutDown 0.3s ease-in forwards;
        }

        .image-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            position: relative;
        }

        .image-container img {
            max-width: 95%;
            max-height: 95%;
            object-fit: contain;
        }

        .image-info {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.8), transparent);
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .image-info:hover {
            padding: 30px 20px 20px;
        }

        .image-description {
            font-size: 12px;
            color: #ccc;
            margin-bottom: 8px;
        }

        .image-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s;
        }

        .image-info.expanded .image-tags {
            max-height: 200px;
            overflow-y: auto;
        }

        .image-tag {
            background: rgba(14, 165, 233, 0.7);
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 11px;
            white-space: nowrap;
        }

        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            font-size: 24px;
            color: #666;
            flex-direction: column;
            gap: 20px;
        }

        .spinner {
            border: 4px solid #333;
            border-top: 4px solid #0ea5e9;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .sidebar {
            width: 280px;
            background: #1a1a1a;
            display: flex;
            flex-direction: column;
            border-left: 1px solid #333;
            overflow-y: auto;
            transform: translateX(-100%);
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            z-index: 200;
            transition: transform 0.3s ease;
        }

        .sidebar.open {
            transform: translateX(0);
        }

        .sidebar-overlay {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 150;
        }

        .sidebar-overlay.visible {
            display: block;
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid #333;
            font-size: 18px;
            font-weight: 700;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .close-btn {
            background: none;
            border: none;
            color: #fff;
            font-size: 24px;
            cursor: pointer;
            padding: 0;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .sidebar-section {
            padding: 20px;
            border-bottom: 1px solid #333;
        }

        .sidebar-section h3 {
            font-size: 12px;
            text-transform: uppercase;
            color: #999;
            margin-bottom: 12px;
            font-weight: 600;
        }

        .active-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .tag {
            display: inline-flex;
            align-items: center;
            background: #0ea5e9;
            padding: 6px 10px;
            border-radius: 20px;
            font-size: 12px;
            gap: 6px;
            animation: slideIn 0.2s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: scale(0.8);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .tag-remove {
            background: none;
            border: none;
            color: #fff;
            cursor: pointer;
            font-size: 16px;
            padding: 0;
            display: flex;
            align-items: center;
            line-height: 1;
        }

        .tag-remove:hover {
            opacity: 0.8;
        }

        .controls {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .control-btn {
            padding: 10px;
            background: #2a2a2a;
            border: 1px solid #444;
            border-radius: 4px;
            color: #fff;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
            text-align: center;
            font-weight: 500;
        }

        .control-btn:hover {
            background: #333;
            border-color: #555;
        }

        .control-btn:active {
            transform: scale(0.98);
        }

        .control-btn.primary {
            background: #0ea5e9;
            border-color: #0ea5e9;
        }

        .control-btn.primary:hover {
            background: #0284c7;
            border-color: #0284c7;
        }

        .button-group {
            position: absolute;
            bottom: 80px;
            right: 20px;
            display: flex;
            gap: 10px;
            align-items: center;
            z-index: 10;
        }

        .action-btn {
            width: 50px;
            height: 50px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid #fff;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            transition: all 0.2s;
        }

        .action-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.1);
        }

        .action-btn:active {
            transform: scale(0.95);
        }

        .action-btn.liked {
            background: #ef4444;
            border-color: #ef4444;
        }

        .action-btn.disliked {
            background: #8b5cf6;
            border-color: #8b5cf6;
        }

        .info-text {
            position: absolute;
            bottom: 20px;
            left: 20px;
            font-size: 12px;
            color: #999;
            z-index: 10;
        }

        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .stat {
            background: #2a2a2a;
            padding: 10px;
            border-radius: 4px;
            text-align: center;
            font-size: 12px;
        }

        .stat .value {
            font-size: 16px;
            font-weight: 600;
            color: #0ea5e9;
        }

        .stat .label {
            color: #999;
            margin-top: 4px;
        }

        .tab-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .tab-btn {
            flex: 1;
            padding: 10px;
            background: #2a2a2a;
            border: 1px solid #444;
            border-radius: 6px;
            color: #999;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
        }

        .tab-btn.active {
            background: #0ea5e9;
            border-color: #0ea5e9;
            color: #fff;
        }

        .search-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 300;
            flex-direction: column;
            padding: 20px;
        }

        .search-modal.active {
            display: flex;
        }

        .search-modal-header {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .search-input {
            flex: 1;
            padding: 12px;
            background: #2a2a2a;
            border: 1px solid #444;
            border-radius: 8px;
            color: #fff;
            font-size: 16px;
        }

        .search-input:focus {
            outline: none;
            border-color: #0ea5e9;
            background: #333;
        }

        .search-close {
            background: none;
            border: none;
            color: #fff;
            font-size: 24px;
            cursor: pointer;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .suggested-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 15px;
        }

        .suggested-tag {
            background: #2a2a2a;
            border: 1px solid #444;
            padding: 8px 12px;
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .suggested-tag:hover {
            background: #333;
            border-color: #0ea5e9;
        }

        .liked-count {
            font-size: 12px;
            color: #666;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #333;
        }

        /* Particle effects */
        .particle {
            position: fixed;
            pointer-events: none;
            font-size: 24px;
            animation: float-up 1.5s ease-out forwards;
        }

        @keyframes float-up {
            0% {
                opacity: 1;
                transform: translateY(0) translateX(0) scale(1);
            }
            100% {
                opacity: 0;
                transform: translateY(-100px) translateX(var(--tx, 0)) scale(0.5);
            }
        }

        @media (min-width: 768px) {
            .sidebar {
                transform: translateX(0);
                position: relative;
                width: 300px;
                z-index: 10;
            }

            .sidebar-overlay {
                display: none !important;
            }

            .header-btn:first-child {
                display: none;
            }

            .main-content {
                flex: 1;
            }
        }

        @media (max-width: 480px) {
            .header {
                padding: 10px 12px;
            }

            .header-title {
                font-size: 18px;
            }

            .button-group {
                right: 10px;
                bottom: 60px;
            }

            .action-btn {
                width: 45px;
                height: 45px;
                font-size: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="progress-bar" id="progressBar"></div>
        
        <div class="header">
            <button class="header-btn" id="menuBtn" title="Menu">☰</button>
            <div class="header-title">scrollowo</div>
            <button class="header-btn" id="searchBtn" title="Add tags">🔍</button>
        </div>

        <div class="main-content">
            <div class="sidebar" id="sidebar">
                <div class="sidebar-header">
                    <span>Menu</span>
                    <button class="close-btn" id="closeSidebarBtn">✕</button>
                </div>

                <div class="tab-buttons">
                    <button class="tab-btn active" data-tab="tags">Tags</button>
                    <button class="tab-btn" data-tab="curated">Curated</button>
                    <button class="tab-btn" data-tab="settings">Settings</button>
                </div>

                <div id="tags-tab" class="tab-content">
                    <div class="sidebar-section">
                        <h3>Active Tags</h3>
                        <div class="active-tags" id="activeTags"></div>
                    </div>

                    <div class="sidebar-section">
                        <h3>Actions</h3>
                        <div class="controls">
                            <button class="control-btn primary" id="refreshBtn">Refresh Feed</button>
                            <button class="control-btn" id="clearTagsBtn">Clear All Tags</button>
                        </div>
                    </div>

                    <div class="sidebar-section">
                        <div class="liked-count">
                            <span id="likedCount">0</span> liked<br>
                            <span id="dislikedCount">0</span> disliked
                        </div>
                    </div>

                    <div class="sidebar-section">
                        <div class="stats">
                            <div class="stat">
                                <div class="value" id="totalImages">0</div>
                                <div class="label">Loaded</div>
                            </div>
                            <div class="stat">
                                <div class="value" id="currentIndex">0</div>
                                <div class="label">Position</div>
                            </div>
                        </div>
                    </div>
                </div>

                <div id="curated-tab" class="tab-content" style="display: none;">
                    <div class="sidebar-section">
                        <h3>Curated Tags</h3>
                        <div class="active-tags" id="curatedTags"></div>
                        <div style="margin-top: 12px; font-size: 12px; color: #666;">
                            Generated from your likes
                        </div>
                    </div>
                </div>

                <div id="settings-tab" class="tab-content" style="display: none;">
                    <div class="sidebar-section">
                        <h3>Settings</h3>
                        <div style="margin-bottom: 12px;">
                            <label style="display: flex; align-items: center; gap: 8px; font-size: 14px; cursor: pointer;">
                                <input type="checkbox" id="autoSuggestToggle" checked>
                                Auto-suggest tags
                            </label>
                        </div>
                        <div style="margin-bottom: 12px;">
                            <label style="display: flex; align-items: center; gap: 8px; font-size: 14px; cursor: pointer;">
                                <input type="checkbox" id="curateFromLikesToggle" checked>
                                Curate from likes
                            </label>
                        </div>
                        <div style="margin-bottom: 12px;">
                            <label style="display: flex; align-items: center; gap: 8px; font-size: 14px; cursor: pointer;">
                                <input type="checkbox" id="particlesToggle" checked>
                                Particle effects
                            </label>
                        </div>
                        <button class="control-btn" id="clearLikesBtn" style="margin-top: 12px;">Clear Likes</button>
                        <button class="control-btn" id="exportDataBtn" style="margin-top: 8px;">Export Data</button>
                    </div>
                </div>
            </div>

            <div class="sidebar-overlay" id="sidebarOverlay"></div>

            <div class="feed">
                <div id="imageStack"></div>
                <div class="button-group">
                    <button class="action-btn" id="dislikeBtn" title="Dislike this image">👎</button>
                    <button class="action-btn" id="likeBtn" title="Like this image">♡</button>
                </div>
                <div class="info-text">
                    <div id="imageCount">0 / 0</div>
                </div>
            </div>
        </div>
    </div>

    <div class="search-modal" id="searchModal">
        <div class="search-modal-header">
            <input type="text" class="search-input" id="tagSearchInput" placeholder="Search tags...">
            <button class="search-close" id="searchCloseBtn">✕</button>
        </div>
        <div id="errorContainer"></div>
        <div id="suggestedTagsContainer">
            <h3 style="margin-bottom: 12px; color: #999; font-size: 12px;">POPULAR TAGS</h3>
            <div class="suggested-tags" id="suggestedTags"></div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
